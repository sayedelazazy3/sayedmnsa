<style>
*{box-sizing:border-box;font-family:'Cairo',Tahoma,sans-serif}body{margin:0;background:#040D08;color:#fff}
.h{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0A2E1E,#04120B);border-bottom:3px solid #D4AF37;padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.logo{width:72px;height:72px;border-radius:50%;border:3px solid gold;box-shadow:0 0 18px gold,0 0 32px rgba(212,175,55,.4);object-fit:cover;background:#000}
.free{background:linear-gradient(90deg,#00FF88,#00E676);color:#000;padding:6px 11px;border-radius:999px;font-weight:900;font-size:12px}
.install{background:linear-gradient(90deg,#FFD700,#FFC400);color:#000;border:none;padding:10px 18px;border-radius:999px;font-weight:900;cursor:pointer;box-shadow:0 0 18px gold,0 0 35px rgba(255,215,0,.45);font-size:14px;display:block !important;animation:glow 2s infinite}@keyframes glow{0%{box-shadow:0 0 10px gold}50%{box-shadow:0 0 26px gold,0 0 45px rgba(255,215,0,.5)}100%{box-shadow:0 0 10px gold}}
.card{background:linear-gradient(145deg,#112318,#0A170F);border:2px solid #C9A227;border-radius:20px;padding:16px 8px;min-height:148px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:9px;box-shadow:0 8px 20px rgba(0,0,0,.5);cursor:pointer;transition:.15s}.card:active{transform:scale(.96)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;padding:13px}
.m{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;z-index:99;overflow:auto;padding:10px;justify-content:center;align-items:flex-start}.m.o{display:flex}.b{background:linear-gradient(180deg,#132A1C,#0B1E14);border:2px solid gold;border-radius:18px;max-width:780px;width:100%;padding:16px}
input,textarea,select{width:100%;background:#06140B;border:1.6px solid #C9A227;color:#fff;border-radius:11px;padding:12px;margin-top:7px;font-size:15px}
.bt{width:100%;background:linear-gradient(90deg,#D4AF37,#FFD700);color:#000;border:none;font-weight:900;padding:13px;border-radius:11px;margin-top:10px;cursor:pointer;font-size:16px}
.out{background:#fff;color:#111;padding:12px;border-radius:12px;margin-top:10px;white-space:pre-wrap;max-height:60vh;overflow:auto;line-height:1.8}
.upload-box{border:2px dashed #FFD700;background:rgba(255,215,0,.07);border-radius:14px;padding:14px;text-align:center;margin-top:8px;cursor:pointer}
.preview{max-width:100%;border-radius:12px;margin-top:8px}
.tag{display:inline-block;background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.35);color:#FFD700;padding:4px 9px;border-radius:999px;font-size:11px;margin:2px}
</style>

    deferredPrompt.prompt();
    const choice=await deferredPrompt.userChoice;
    if(choice.outcome==='accepted'){installBtn.style.display='none';}
    deferredPrompt=null;
  }else{
    // مفيش beforeinstallprompt (آيفون أو المتصفح محتاج تثبيت يدوي)
    const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
    const help=document.getElementById('installHelp');
    const txt=document.getElementById('helpText');
    if(isIOS){
      txt.innerHTML=`<b>على الآيفون:</b><br>1- دوس زر <b>المشاركة ⎙</b> تحت في سفاري<br>2- اختار <b>إضافة إلى الشاشة الرئيسية ➕</b><br>3- دوس <b>إضافة</b><br><br>هيبقى تطبيق زي الواتساب`;
    }else{
      txt.innerHTML=`<b>على الأندرويد:</b><br>1- دوس <b>⋮</b> فوق في كروم<br>2- اختار <b>تثبيت التطبيق</b> أو <b>إضافة إلى الشاشة الرئيسية</b><br>3- دوس <b>تثبيت</b><br><br>لو مش ظاهر، حدث كروم لآخر إصدار وجرب تاني`;
    }
    help.style.display='flex';
  }
};

let base=["كاتب المقالات","مولد الصور AI","مزيل الخلفية","النص لصوت","ملخص PDF","مولد الفيديو","محسن 4K","المترجم الفوري","كاتب الاعلانات","مساعد الاكواد","مولد الهاشتاجات","كاتب السيرة الذاتية","مولد الاسماء","حاسبة الارباح","مولد QR","مختصر الروابط","كاتب الايميلات","مولد الباسورد","محول العملات","صانع الاستبيان","كاتب القصص","مولد العناوين","مدقق املائي","عداد الكلمات","مولد الوصف","اعادة صياغة","كاتب تغريدات","مولد اسئلة","كاتب المراجعات","مولد الافكار","مصمم لوجو نصي","مقارنة اسعار","حاسبة خصم","مولد فاتورة","حاسبة ضريبة","منشئ باركود","محول PDF","ضاغط صور","محرر صور","مزيل علامة","وصف يوتيوب","تاج يوتيوب","حاسبة مشاهدات","سكريبت ريلز","بايو انستا","كابشن","حاسبة تفاعل","ميمز","مخطط محتوى","بومودورو","سيرة انستا","حاسبة BMI","حاسبة عمر","محول تاريخ","مولد توقيع","هاشتاج تيك توك","اسم مستخدم","فحص باسورد","ايميل وهمي","رقم وهمي","محول وحدات","حاسبة نسبة","مولد جدول","CV انجليزي","كاتب خطاب","شعار قهوة","حاسبة سعرات","مولد نكت","اقتباسات","مترجم عامية","اسئلة انترفيو","وصف امازون","كلمات مفتاحية","فحص سيو","خطة تسويق","حاسبة ROI","عرض سعر","منشئ عقد","حاسبة قسط","ايصال","شهادة","كروت","تقييمات","مقارنة منتجين","عناوين شورتس","وصف متجر","اسم براند","شعار مطعم","حاسبة شحن","كوبون","سؤال وجواب","بوست لينكد ان","هاشتاج لينكد ان","حاسبة مرتب","ختم","تايم لاين","انفوجرافيك","نص لايموجي","سؤال استبيان","خطة يومية","لوجو AI","محرر فيديو نصي","مولد صوت AI","كاتب كتاب","خطة مشروع","ارباح يوتيوب برو","مولد thumbnail","سكريبت اعلان","اسم قناة","وصف تيك توك","هامش ربح","ايميل تسويقي","صفحة هبوط","QR ملون","رابط واتساب","محول WebP","مزيل ضوضاء","تعليق صوتي","قصة اطفال","اسئلة ذكاء","حاسبة استثمار","خطة مالية","فاتورة ضريبية","عقد عمل","سياسة خصوصية","شروط استخدام","تحويل مقاسات","اسم متجر","شعار شخصي","مخطط رحلات","جدول مذاكرة","معدل تراكمي","CV ATS","Cover Letter","اسئلة MCQ","مصحح انجليزي","هاشتاج 30","بوست فيسبوك","فكرة مشروع","تسعير منتج","وصف سيو","عنوان سيو","محلل منافسين","خطة 30 يوم","كالندر محتوى","رد تلقائي","اسم دومين","تكلفة اعلان","تقرير اداء","الختم الذهبي"];
let cats={2:"صور",3:"صور",4:"صوت",5:"ملفات",6:"فيديو",7:"صور",8:"كتابة",15:"صور",38:"صور",39:"صور",40:"صور",102:"فيديو",103:"صوت"};
let allTools=[];for(let i=0;i<150;i++){let c=cats[i+1]|| (i<30?"كتابة":i<60?"صور":i<90?"فيديو":i<110?"صوت":"ملفات");allTools.push({id:i+1,name:base[i],cat:c})}
function uploadLabel(cat){if(cat==="صور") return "صورة";if(cat==="فيديو") return "فيديو";if(cat==="صوت") return "صوت";if(cat==="ملفات") return "PDF/ملف";return "نص";}
function acceptType(cat){if(cat==="صور") return "image/*";if(cat==="فيديو") return "video/*";if(cat==="صوت") return "audio/*";if(cat==="ملفات") return ".pdf,.doc,.docx,.txt";return "*/*";}
function render(f="",cat="all"){let g=document.getElementById('g');g.innerHTML='';let list=allTools.filter(t=>(!f||t.name.includes(f))&&(cat==="all"||t.cat===cat));list.forEach(t=>{let d=document.createElement('div');d.className='card';d.innerHTML=`<img src="${SEAL}" style="width:58px;height:58px;border-radius:50%;border:2px solid gold;box-shadow:0 0 12px gold;background:#000"><div style="color:gold;font-size:16px;font-weight:900">${t.name}</div><div style="font-size:12px;color:#A7F3D0;font-weight:800">${t.cat} #${t.id}</div><div class="tag">رابط حقيقي + رفع ${uploadLabel(t.cat)}</div>`;d.onclick=()=>openTool(t);g.appendChild(d);})}
function closeM(){document.getElementById('mm').classList.remove('o');window.uploadedData=null;window.uploadedURL=null;}
function openTool(t){document.getElementById('mm').classList.add('o');document.getElementById('mt').textContent=t.name;let pc=document.getElementById('pc');let up=`<div class="upload-box" onclick="document.getElementById('fileIn').click()"><div style="font-size:26px">📁</div><div style="font-weight:900;color:#FFD700">ارفع ${uploadLabel(t.cat)} للتعديل</div><div style="font-size:11px;color:#AAA">يدعم ${acceptType(t.cat)} - سحب وإفلات</div><input type="file" id="fileIn" accept="${acceptType(t.cat)}" style="display:none" onchange="handleFile(this.files[0],'${t.cat}')"></div><div id="previewArea"></div>`;let controls="";if(t.id==2) controls=`<textarea id="inp" rows="2" placeholder="اوصف الصورة"></textarea><button class="bt" onclick="genImage()">توليد صورة حقيقية 🖼️</button><div id="o" class="out" style="display:none;text-align:center"><img id="imOut" class="preview"><br><a id="dl" download class="bt" style="display:inline-block;text-decoration:none">تحميل ⬇️</a></div>`;else if(t.id==3) controls=`<button class="bt" onclick="removeBGReal()">إزالة الخلفية حقيقي ✂️</button><canvas id="cv" style="display:none"></canvas><div id="o" class="out" style="display:none;text-align:center"><img id="outImg" class="preview"><br><a id="dl" download="no-bg.png" class="bt" style="display:inline-block;text-decoration:none">تحميل</a></div>`;else if(t.id==15) controls=`<input id="inp" placeholder="رابط او نص"><button class="bt" onclick="makeQR()">توليد QR حقيقي</button><div id="o" class="out" style="display:none;text-align:center"><img id="im" style="width:260px;height:260px"><br><a id="dl" download class="bt" style="display:inline-block;text-decoration:none">تحميل</a></div>`;else if(t.id==4) controls=`<textarea id="inp" rows="3" placeholder="نص للصوت"></textarea><button class="bt" onclick="textToSpeech()">تشغيل صوت حقيقي 🔊</button><div id="o" class="out" style="display:none"></div>`;else if(t.id==8) controls=`<textarea id="inp" rows="2" placeholder="نص للترجمة"></textarea><button class="bt" onclick="translateReal()">ترجمة حقيقية 🌍</button><div id="o" class="out" style="display:none"></div>`;else controls=`<textarea id="inp" rows="3" placeholder="اكتب طلبك"></textarea><button class="bt" onclick="runRealAI('${t.name}')">تشغيل برابط حقيقي 🚀</button><div id="o" class="out" style="display:none"></div>`;pc.innerHTML=`<div style="text-align:center"><img src="${SEAL}" style="width:72px;height:72px;border-radius:50%;border:2px solid gold"></div>`+up+controls;let box=document.querySelector('.upload-box');box.addEventListener('dragover',e=>{e.preventDefault()});box.addEventListener('drop',e=>{e.preventDefault();handleFile(e.dataTransfer.files[0],t.cat);});}
function handleFile(file,cat){if(!file) return;let area=document.getElementById('previewArea');area.innerHTML=`<div style="margin-top:8px;background:rgba(255,215,0,.08);padding:8px;border-radius:8px"><b style="color:gold">${file.name}</b> - ${(file.size/1024).toFixed(1)}KB</div>`;if(cat==="صور"&&file.type.startsWith("image/")){let r=new FileReader();r.onload=e=>{area.innerHTML+=`<img src="${e.target.result}" class="preview">`;window.uploadedData=e.target.result;};r.readAsDataURL(file);}else if(cat==="فيديو"){let u=URL.createObjectURL(file);area.innerHTML+=`<video src="${u}" controls class="preview"></video>`;window.uploadedURL=u;}else{let r=new FileReader();r.onload=e=>{let t=e.target.result.slice(0,4000);let inp=document.getElementById('inp');if(inp) inp.value=t.slice(0,2000);window.fileText=t;};r.readAsText(file);}}
async function genImage(){let p=document.getElementById('inp').value||'luxury logo';let o=document.getElementById('o');let im=document.getElementById('imOut');o.style.display='block';let url='https://image.pollinations.ai/prompt/'+encodeURIComponent(p)+'?width=768&height=768&seed='+Math.random();im.src=url;document.getElementById('dl').href=url;}
function removeBGReal(){if(!window.uploadedData){alert('ارفع صورة اولا');return;}let img=new Image();img.onload=()=>{let cv=document.getElementById('cv');let ctx=cv.getContext('2d');cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);let d=ctx.getImageData(0,0,cv.width,cv.height);for(let i=0;i<d.data.length;i+=4){if((d.data[i]+d.data[i+1]+d.data[i+2])/3>205) d.data[i+3]=0;}ctx.putImageData(d,0,0);document.getElementById('outImg').src=cv.toDataURL('image/png');document.getElementById('dl').href=document.getElementById('outImg').src;document.getElementById('o').style.display='block';};img.src=window.uploadedData;}
function makeQR(){let v=encodeURIComponent(document.getElementById('inp').value||'test');let url='https://api.qrserver.com/v1/create-qr-code/?size=400x400&data='+v;document.getElementById('im').src=url;document.getElementById('dl').href=url;document.getElementById('o').style.display='block';}
function textToSpeech(){let t=document.getElementById('inp').value||'مرحبا';let o=document.getElementById('o');o.style.display='block';let u=new SpeechSynthesisUtterance(t.slice(0,1800));u.lang='ar-SA';speechSynthesis.speak(u);o.textContent='🔊 يشغل الآن';}
async function translateReal(){let txt=document.getElementById('inp').value;let o=document.getElementById('o');o.style.display='block';try{let r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=ar|en`);let j=await r.json();o.textContent=j.responseData.translatedText;}catch{o.textContent=txt;}}
async function runRealAI(n){let q=document.getElementById('inp').value||'مرحبا';let o=document.getElementById('o');o.style.display='block';o.textContent='⏳ يتصل بـ Pollinations AI...';try{let r=await fetch('https://text.pollinations.ai/'+encodeURIComponent(q+' '+n));let t=await r.text();o.textContent=t;}catch{o.textContent=q;}}
document.getElementById('search').addEventListener('input',e=>render(e.target.value,document.getElementById('filter').value));
document.getElementById('filter').addEventListener('change',e=>render(document.getElementById('search').value,e.target.value));
render();
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>سيد العزازي - تحديث 1</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:Tajawal} body{margin:0;background:#04100C;color:#E8F5E9}
.header{position:sticky;top:0;z-index:50;background:rgba(4,16,12,.95);backdrop-filter:blur(12px);border-bottom:2px solid #D4AF37;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
.logo-big{width:52px;height:52px;border-radius:50%;border:2px solid #D4AF37;object-fit:cover}
.search{background:#0F201A;border:1px solid rgba(212,175,55,.3);border-radius:999px;padding:9px 14px;color:#fff;width:220px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px} @media(min-width:768px){.grid{grid-template-columns:repeat(5,1fr)}}
.card{background:linear-gradient(180deg,#0F201A,#0A1610);border:1px solid rgba(212,175,55,.18);border-radius:16px;padding:12px;cursor:pointer;transition:.2s} .card.active-tool{border-color:#FFD700;box-shadow:0 0 0 2px rgba(255,215,0,.3),0 10px 30px rgba(212,175,55,.3);background:linear-gradient(180deg,#143326,#0F201A)} .badge{font-size:10px;background:rgba(212,175,55,.15);color:#F9E076;padding:2px 7px;border-radius:999px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:12px;overflow:auto} .modal.open{display:flex}
.box{background:#0B1E16;border:1px solid #D4AF37;border-radius:18px;max-width:720px;width:100%;padding:18px;margin:auto}
textarea,input{width:100%;background:#04100C;border:1px solid rgba(212,175,55,.3);border-radius:10px;color:#fff;padding:10px;margin-top:8px}
.btn{width:100%;background:linear-gradient(90deg,#D4AF37,#FFD700);color:#04100C;border:none;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;margin-top:10px}
.btn2{width:100%;background:transparent;border:1px solid #D4AF37;color:#D4AF37;padding:10px;border-radius:10px;cursor:pointer;margin-top:8px}
.out{white-space:pre-wrap;background:#fff;color:#111;padding:14px;border-radius:10px;margin-top:12px;line-height:1.9;font-size:14px;max-height:60vh;overflow:auto}
</style></head><body>
